<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>tradtrash</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #5a0000;
            color: white;
        }

        header {
            position: relative;
            padding: 20px;
        }

        h1 {
            margin: 0;
        }

        .logo {
            position: absolute;
            top: 15px;
            right: 20px;
            width: 100px;
            height: auto;
        }

        main {
            padding: 30px;
            min-height: 80vh;
        }

        footer {
            background-color: #3a3a3a;
            text-align: center;
            padding: 10px;
            font-size: 14px;
        }

        /* CONTENEDOR DE BOTONES */
        .grid-botones {
            display: grid;
            grid-template-columns: repeat(2, 1fr); /* 2 por fila */
            gap: 25px;
            max-width: 900px;
        }

        /* BOTÓN */
        .btn {
            text-decoration: none;
            color: white;
        }

        .btn img {
            width: 100%;
            aspect-ratio: 1 / 1;
            object-fit: cover;
            border-radius: 15px;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .btn span {
            display: block;
            margin-top: 10px;
            font-size: 18px;
        }

        .btn:hover img {
            transform: scale(1.07);
            box-shadow: 0px 0px 20px rgba(0,0,0,0.6);
        }

        /* RESPONSIVE (celular = 1 por fila) */
        @media (max-width: 600px) {
            .grid-botones {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>

    <header>
        <h1>tradtrash</h1>
        <img src="diablo tradtrash.png" alt="logo" class="logo">
    </header>

    <main>
        <h2>soy joy y hago dibujitos</h2>

        <div class="grid-botones">

            <!-- BOTÓN TATTOOS -->
            <a href="tattoos.html" class="btn">
                <img src="tattoo2.jfif" alt="Tattoos">
                <span>Tattoos</span>
            </a>

            <!-- BOTÓN DISEÑOS -->
            <a href="disenos.html" class="btn">
                <img src="diseño2.jfij" alt="Diseños">
                <span>Diseños</span>
            </a>

        </div>

    </main>

    <footer>
        <p>© 2026 FISURAS S.A ® - Todos los derechos reservados</p>
    </footer>

</body>
</html>
